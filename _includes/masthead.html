{% include base_path %}

<div class="masthead">
  <a class="masthead__brand" href="{{ base_path }}/about/" aria-label="About {{ site.author.name | default: site.title }}">
    {{ site.author.name | default: site.title }}
  </a>
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">

        <!-- Site title (visually hidden; kept for accessibility + home link) -->
        <a class="site-title sr-only" href="{{ base_path }}/" aria-label="Home">
          {{ site.title }}
        </a>

        <button class="hidden">
          <div class="navicon"></div>
        </button>

        <!-- Main navigation links: right side -->
        <ul class="visible-links">
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
        </ul>

        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>

</div>
